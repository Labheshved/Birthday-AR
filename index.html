<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.0/dist/mind-ar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; background: #000; }
      /* Nuclear option to hide A-Frame UI */
      .a-enter-vr, .a-enter-ar, .a-loader-title, .a-ui { display: none !important; visibility: hidden !important; }
      
      #startButton {
        position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
        z-index: 10000; padding: 20px 40px; background: #d4af37; color: white;
        border: none; border-radius: 50px; font-family: 'serif'; font-weight: bold; font-size: 1.2rem;
        box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      }
    </style>
  </head>
  <body>
    <button id="startButton">Tap for April 14th Surprise ❤️</button>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiScanning: no;" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: true"
      embedded>
      
      <a-assets>
        <video id="birthdayVideo" src="./birthday-memory-reel.mp4" 
               preload="auto" loop="true" playsinline webkit-playsinline 
               crossOrigin="anonymous"></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#birthdayVideo" width="1" height="1.77" position="0 0 0"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const startButton = document.querySelector('#startButton');
      const video = document.querySelector('#birthdayVideo');
      const sceneEl = document.querySelector('a-scene');

      // 1. Force a click handler that also handles Audio Context
      startButton.addEventListener('click', () => {
        // Attempt to play video
        video.play().then(() => {
          console.log("Video playing");
          startButton.style.display = 'none';
        }).catch((err) => {
          console.log("Auto-play blocked, muting...");
          video.muted = true;
          video.play();
          startButton.style.display = 'none';
        });
      });

      // 2. Alert if there is a file loading error
      sceneEl.addEventListener("arError", (event) => {
        alert("Camera or Target Error. Please check permissions and file paths.");
      });
    </script>
  </body>
</html>
