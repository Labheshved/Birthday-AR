<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mind-ar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      #startButton {
        position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
        z-index: 1000; padding: 15px 30px; background: #d4af37; color: white;
        border: none; border-radius: 25px; font-family: sans-serif; font-weight: bold;
      }
    </style>
  </head>
  <body>
    <button id="startButton">Click to Start Birthday Surprise ❤️</button>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; uiScanning: no;" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false"
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights">
      
      <a-assets>
        <video id="birthdayVideo" src="./birthday-memory-reel.mp4" 
               preload="auto" loop="true" 
               playsinline webkit-playsinline 
               crossOrigin="anonymous"></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#birthdayVideo" width="1" height="1.77" position="0 0 0"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const startButton = document.querySelector('#startButton');
      const video = document.querySelector('#birthdayVideo');
      const sceneEl = document.querySelector('a-scene');

      startButton.addEventListener('click', () => {
        // Start the video and the AR engine
        video.play();
        // This ensures the camera starts on mobile
        sceneEl.systems["mindar-image-system"].start(); 
        startButton.style.display = 'none';
      });
    </script>
  </body>
</html>
