<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mind-ar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; background: #000; }
      .a-enter-vr, .a-enter-ar { display: none !important; }
      #startButton {
        position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
        z-index: 99999; padding: 20px 40px; background: #d4af37; color: white;
        border: none; border-radius: 50px; font-family: serif; font-weight: bold;
      }
    </style>
  </head>
  <body>
    <button id="startButton">Tap for April 14th Surprise ❤️</button>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiScanning: no;" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: true"
      renderer="colorManagement: true, physicallyCorrectLights">
      
      <a-assets>
        <video id="birthdayVideo" src="./birthday-memory-reel.mp4" 
               preload="auto" loop="true" playsinline webkit-playsinline 
               crossOrigin="anonymous"></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#birthdayVideo" width="1" height="1.77" position="0 0 0"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const startButton = document.querySelector('#startButton');
      const video = document.querySelector('#birthdayVideo');
      const sceneEl = document.querySelector('a-scene');

      // Force the camera request as soon as the scene loads
      sceneEl.addEventListener("loaded", () => {
        console.log("A-Frame Scene Loaded");
      });

      // Handle the button click for Video + Sound
      startButton.addEventListener('click', () => {
        video.play().then(() => {
          startButton.style.display = 'none';
        }).catch((e) => {
          console.log("Play failed, trying muted...");
          video.muted = true;
          video.play();
          startButton.style.display = 'none';
        });
      });

      // Check for AR System errors
      sceneEl.addEventListener("arError", (event) => {
        alert("Camera Error: Please ensure you are on HTTPS and have granted camera permissions.");
      });
    </script>
  </body>
</html>
