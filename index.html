<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mind-ar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; background-color: black; }
      
      /* Force hide all VR/AR buttons */
      .a-enter-vr, .a-enter-ar, .a-loader-title {
        display: none !important;
      }

      #startButton {
        position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
        z-index: 99999; padding: 20px 40px; background: #d4af37; color: white;
        border: none; border-radius: 50px; font-family: serif; 
        font-weight: bold; font-size: 1.2rem; cursor: pointer;
        box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      }
    </style>
  </head>
  <body>
    <button id="startButton">Tap for April 14th Surprise ❤️</button>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: no;" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false"
      loading-screen="enabled: false"
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights">
      
      <a-assets>
        <video id="birthdayVideo" src="./birthday-memory-reel.mp4" 
               preload="auto" loop="true" 
               playsinline webkit-playsinline 
               crossOrigin="anonymous"></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-video src="#birthdayVideo" width="1" height="1.77" position="0 0 0"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const startButton = document.querySelector('#startButton');
      const video = document.querySelector('#birthdayVideo');

      startButton.addEventListener('click', () => {
        // Just play the video. The AR system is already running in the background.
        video.play().then(() => {
            console.log("Video playing successfully");
            startButton.style.display = 'none';
        }).catch((err) => {
            console.error("Video play failed:", err);
            // Fallback: try to play muted if it fails
            video.muted = true;
            video.play();
            startButton.style.display = 'none';
        });
      });
    </script>
  </body>
</html>
